name: SUSI E2E CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Run Prisma Client Generation
      run: npx prisma generate
      
    - name: Run Next Build
      run: npm run build
