version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: susi-postgres
    environment:
      POSTGRES_USER: susi_user
      POSTGRES_PASSWORD: susi_password
      POSTGRES_DB: susi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: susi-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: susi_admin
      MINIO_ROOT_PASSWORD: susi_admin_password
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

volumes:
  postgres_data:
  minio_data:
